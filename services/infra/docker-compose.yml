version: '3.9'

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: grading-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - grading-network

  kafka:
    image: bitnami/kafka:3.9
    container_name: grading-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - grading-network

  minio:
    image: minio/minio:latest
    container_name: grading-minio
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - grading-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: grading-keycloak
    command: start --http-port 8088
    ports:
      - "8088:8088"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grading-network

  # ============================================================
  # MICROSERVICES
  # ============================================================

  gateway:
    build: ./gateway
    container_name: grading-gateway
    ports:
      - "8080:8080"
    depends_on:
      - assignment-service
      - submission-service
      - result-service
      - notification-service
    networks:
      - grading-network

  assignment-service:
    build: ./assignment-service
    container_name: grading-assignment
    depends_on:
      - postgres
      - keycloak
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: assignment_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    networks:
      - grading-network

  submission-service:
    build: ./submission-service
    container_name: grading-submission
    depends_on:
      - postgres
      - kafka
      - minio
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: submission_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
    networks:
      - grading-network

  grading-service:
    build: ./grading-service
    container_name: grading-executor
    depends_on:
      - postgres
      - kafka
      - minio
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: grading_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - grading-tmp:/tmp/grading
    networks:
      - grading-network

  result-service:
    build: ./result-service
    container_name: grading-result
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: result_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    networks:
      - grading-network

  notification-service:
    build: ./notification-service
    container_name: grading-notification
    depends_on:
      - postgres
      - kafka
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - grading-network

volumes:
  postgres-data:
  kafka-data:
  minio-data:
  grading-tmp:

networks:
  grading-network:
    driver: bridge
