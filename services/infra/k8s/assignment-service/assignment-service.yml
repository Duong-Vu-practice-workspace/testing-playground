apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-service
  namespace: grading-platform
  labels:
    app: assignment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assignment-service
  template:
    metadata:
      labels:
        app: assignment-service
    spec:
      containers:
        - name: assignment-service
          image: grading/assignment-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: assignment_db
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: assignment-service
  namespace: grading-platform
spec:
  selector:
    app: assignment-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
