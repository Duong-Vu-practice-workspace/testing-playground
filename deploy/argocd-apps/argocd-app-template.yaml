apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grading-${SERVICE_NAME}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Duong-Vu-practice-workspace/${CONFIG_REPO}.git
    targetRevision: main
    path: .
    helm:
      valueFiles:
        - values-stg.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: web-grading
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
