apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{SERVICE_NAME}}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Duong-Vu-practice-workspace/grading-{{SERVICE_NAME}}-config-test2.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: web-grading
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/*/image
