{{- range .Values.services }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grading.fullname" $ }}-{{ .name }}
  labels:
    app: {{ include "grading.name" $ }}-{{ .name }}
spec:
  type: {{ .service.type }}
  ports:
    - port: {{ .service.port }}
      targetPort: {{ .service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "grading.name" $ }}-{{ .name }}
{{- end }}
